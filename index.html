<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>JVS — Jainam Vipulkumar Shastri · Data Analyst</title>
  <meta name="description" content="Data Analyst at Google Data Centers — turning machine demand into zero-downtime infrastructure, one data signal at a time.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/avatar.png">
  <link rel="apple-touch-icon" href="assets/avatar.png">

  <!-- Open Graph -->
  <meta property="og:title" content="JVS — Jainam Vipulkumar Shastri · Data Analyst">
  <meta property="og:description" content="Data Analyst at Google Data Centers. Machine procurement, demand forecasting, blocker mitigation.">
  <meta property="og:image" content="assets/avatar.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="JVS — Data Analyst at Google Data Centers">
  <meta name="twitter:image" content="assets/avatar.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1A73E8;
      --yellow:  #FBBC04;
      --ink:     #0B0F1A;
      --sw-bg:           #FAFBFD;
      --sw-ink:          #0B0F1A;
      --sw-ink-soft:     rgba(11,15,26,0.5);
      --sw-accent:       #1A73E8;
      --sw-font-display: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --sw-font-body:    'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #FAFBFD;
      color: #0B0F1A;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #world { width: 100%; }

    /* ── TOPBAR ── */
    .sw-topbar { padding: clamp(16px, 2.5vw, 28px) clamp(20px, 5vw, 64px) !important; }

    .sw-brand { gap: 12px !important; text-decoration: none !important; }
    .sw-brand__mark {
      width: 36px !important; height: 36px !important;
      border-radius: 50% !important;
      background: url('assets/avatar.png') center/cover no-repeat !important;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.3), 0 4px 12px rgba(0,0,0,0.3) !important;
    }
    .sw-brand__name {
      font-size: 1.6rem !important; font-weight: 900 !important;
      letter-spacing: -0.04em !important; color: #FFFFFF !important;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4) !important;
    }

    /* ── NAV ── */
    .sw-nav {
      background: rgba(0,0,0,0.5) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-radius: 999px !important; padding: 6px !important; gap: 2px !important;
    }
    .sw-nav__item {
      font-size: 0.95rem !important; font-weight: 500 !important;
      color: rgba(255,255,255,0.7) !important; padding: 9px 22px !important;
      border-radius: 999px !important;
    }
    .sw-nav__item:hover { color: #FFFFFF !important; background: rgba(255,255,255,0.12) !important; }
    .sw-nav__item.is-active {
      color: #fff !important; background: var(--blue) !important;
      box-shadow: 0 0 0 1px rgba(26,115,232,0.3), 0 4px 16px rgba(26,115,232,0.3) !important;
    }

    /* ── SCENE ── */
    .sw-scene { background: #FAFBFD !important; }
    .sw-scene__video, .sw-scene__still {
      object-fit: cover !important; object-position: center center !important;
    }

    /* ── COPY LAYER — kill default gradient ── */
    .sw-copylayer::before { display: none !important; }

    /* ── COPY — Helvetica editorial ── */
    .sw-copy {
      width: min(55vw, 640px) !important;
      left: clamp(28px, 6vw, 80px) !important;
      background: none !important;
      border: none !important;
      padding: 0 !important;
      opacity: 1 !important;
      transition: none !important;
    }

    .sw-copy__num {
      font-size: 0.7rem !important; letter-spacing: 0.2em !important;
      color: rgba(255,255,255,0.5) !important; font-variant-numeric: tabular-nums !important;
    }

    .sw-copy__eyebrow {
      display: block !important; margin-top: 14px !important;
      font-size: 0.78rem !important; font-weight: 700 !important;
      letter-spacing: 0.22em !important; text-transform: uppercase !important;
      color: rgba(255,255,255,0.85) !important;
    }

    .sw-copy__title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
      font-size: clamp(3.2rem, 6.5vw, 7rem) !important;
      font-weight: 900 !important; line-height: 0.95 !important;
      letter-spacing: -0.04em !important; color: #FFFFFF !important;
      text-shadow: 0 2px 16px rgba(0,0,0,0.7), 0 1px 4px rgba(0,0,0,0.5), 0 0 40px rgba(0,0,0,0.3) !important;
      margin: 12px 0 0 !important;
    }

    .sw-copy__body {
      margin-top: 20px !important;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
      font-size: clamp(1.05rem, 1.5vw, 1.2rem) !important;
      font-weight: 400 !important; line-height: 1.7 !important;
      color: rgba(255,255,255,0.9) !important; max-width: 42ch !important;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6), 0 0 30px rgba(0,0,0,0.3) !important;
    }

    .sw-copy__tags { margin-top: 24px !important; gap: 8px !important; }
    .sw-copy__tags li {
      font-size: 0.8rem !important; font-weight: 600 !important;
      padding: 6px 15px !important; border-radius: 999px !important;
      background: rgba(0,0,0,0.35) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      color: #FFFFFF !important;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4) !important;
    }

    .sw-copy__cta { margin-top: 28px !important; gap: 14px !important; }
    .sw-btn {
      font-size: 0.95rem !important; font-weight: 600 !important;
      padding: 14px 28px !important; border-radius: 999px !important;
      transition: transform 0.2s, box-shadow 0.2s !important;
    }
    .sw-btn:hover { transform: translateY(-2px) !important; }
    .sw-btn--primary {
      background: var(--blue) !important; color: #fff !important;
      box-shadow: 0 0 0 1px rgba(26,115,232,0.4), 0 8px 28px rgba(26,115,232,0.45) !important;
    }
    .sw-btn--secondary {
      background: rgba(255,255,255,0.15) !important; color: #FFFFFF !important;
      border: 1px solid rgba(255,255,255,0.3) !important;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3) !important;
    }

    /* ── Per-section copy POSITION ──
       Uses nth-child to move copy around the screen.
       UX: visual hierarchy, different positions reduce monotony
       and keep the viewer's eye exploring.
    */

    /* Section 1 (Hero): bottom-left — grounded intro */
    .sw-copy:nth-child(1) {
      top: auto !important; bottom: 12% !important;
      left: clamp(28px, 6vw, 80px) !important;
      transform: none !important;
    }

    /* Section 2 (Skills): top-right — shift attention */
    .sw-copy:nth-child(2) {
      top: 16% !important; bottom: auto !important;
      left: auto !important; right: clamp(28px, 6vw, 80px) !important;
      transform: none !important;
      text-align: right !important;
    }
    .sw-copy:nth-child(2) .sw-copy__tags { justify-content: flex-end !important; }

    /* Section 3 (Projects): center-left — impact */
    .sw-copy:nth-child(3) {
      top: 50% !important; bottom: auto !important;
      left: clamp(28px, 6vw, 80px) !important;
      transform: translateY(-50%) !important;
    }

    /* Section 4 (Contact): centered — CTA focal point */
    .sw-copy:nth-child(4) {
      top: 50% !important; bottom: auto !important;
      left: 50% !important; right: auto !important;
      transform: translate(-50%, -50%) !important;
      text-align: center !important;
      width: min(60vw, 680px) !important;
    }
    .sw-copy:nth-child(4) .sw-copy__tags { justify-content: center !important; }
    .sw-copy:nth-child(4) .sw-copy__cta { justify-content: center !important; flex-wrap: wrap !important; }

    /* ── INTERSTITIAL TEXT — appears during connectors ── */
    .jvs-interstitial {
      position: fixed; inset: 0; z-index: 25;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s ease;
    }
    .jvs-interstitial.is-visible { opacity: 1; }

    .jvs-interstitial__text {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 900; font-size: clamp(2.5rem, 6vw, 5rem);
      letter-spacing: -0.04em; color: #FFFFFF;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3);
      text-align: center; line-height: 1.05;
      max-width: 80vw;
    }
    .jvs-interstitial__text .jvs-small {
      display: block; font-weight: 400;
      font-size: 0.35em; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
    }
    .jvs-interstitial__text .jvs-accent {
      color: var(--blue);
    }

    /* ── ROUTE RAIL ── */
    .sw-route { right: clamp(16px, 2.8vw, 36px) !important; gap: 0 !important; padding: 0 !important; }
    .sw-route::before {
      content: '' !important; position: absolute !important;
      left: 50% !important; top: 22px !important; bottom: 22px !important;
      width: 1px !important; transform: translateX(-50%) !important;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.2) 80%, transparent) !important;
      pointer-events: none !important;
    }
    .sw-route__dot { width: 44px !important; height: 44px !important; display: flex !important; align-items: center !important; justify-content: center !important; }
    .sw-route__dot i {
      width: 6px !important; height: 6px !important; border-radius: 50% !important;
      background: rgba(255,255,255,0.3) !important; border: 1px solid rgba(255,255,255,0.2) !important;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1) !important;
    }
    .sw-route__dot.is-active i {
      width: 8px !important; height: 28px !important; border-radius: 999px !important;
      background: var(--blue) !important; border-color: transparent !important;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.25), 0 0 16px rgba(26,115,232,0.55) !important;
    }
    .sw-route__label {
      right: 52px !important; font-size: 0.78rem !important; font-weight: 600 !important;
      background: rgba(0,0,0,0.6) !important; border: 1px solid rgba(255,255,255,0.15) !important;
      color: #FFFFFF !important; padding: 5px 12px !important; border-radius: 999px !important;
      opacity: 0 !important; transition: opacity 0.2s, transform 0.2s !important;
      transform: translateY(-50%) translateX(4px) !important;
    }
    .sw-route__dot.is-active .sw-route__label,
    .sw-route__dot:hover .sw-route__label {
      opacity: 1 !important; transform: translateY(-50%) translateX(0) !important;
    }

    /* ── MISC ── */
    .sw-hint { color: rgba(255,255,255,0.5) !important; letter-spacing: 0.16em !important; font-size: 0.7rem !important; }
    .sw-hint i { border-color: rgba(255,255,255,0.4) !important; }
    .sw-scrollbar { background: rgba(255,255,255,0.1) !important; }

    /* ── MOBILE ── */
    @media (max-width: 860px) {
      .sw-topbar { padding: 14px 16px !important; }
      .sw-brand__name { font-size: 1.25rem !important; }
      .sw-brand__mark { width: 26px !important; height: 30px !important; }
      .sw-nav { display: none !important; }

      /* Reset all per-section positions on mobile → bottom-anchored */
      .sw-copy, .sw-copy:nth-child(1), .sw-copy:nth-child(2),
      .sw-copy:nth-child(3), .sw-copy:nth-child(4) {
        left: 16px !important; right: 16px !important; width: auto !important;
        top: auto !important; bottom: calc(64px + env(safe-area-inset-bottom)) !important;
        transform: none !important; text-align: left !important;
        max-width: none !important;
      }
      .sw-copy:nth-child(2) .sw-copy__tags,
      .sw-copy:nth-child(4) .sw-copy__tags,
      .sw-copy:nth-child(4) .sw-copy__cta { justify-content: flex-start !important; }

      .sw-copy__title { font-size: clamp(2.2rem, 9vw, 3rem) !important; }
      .sw-copy__body { font-size: 1rem !important; max-width: 55ch !important; }

      .sw-copy__tags {
        flex-wrap: nowrap !important; overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important; scrollbar-width: none !important;
        gap: 6px !important; margin-top: 14px !important;
      }
      .sw-copy__tags::-webkit-scrollbar { display: none !important; }
      .sw-copy__tags li { flex-shrink: 0 !important; font-size: 0.78rem !important; padding: 6px 14px !important; }

      .sw-copy__cta { flex-direction: column !important; gap: 10px !important; }
      .sw-btn { width: 100% !important; text-align: center !important; padding: 15px 24px !important; min-height: 44px !important; }

      .sw-route { right: 10px !important; }
      .sw-route__label { display: none !important; }
      .sw-hint { bottom: calc(16px + env(safe-area-inset-bottom)) !important; }

      .sw-copylayer::before {
        display: block !important; width: 100% !important; height: 65% !important;
        top: auto !important; bottom: 0 !important;
        background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 35%, rgba(0,0,0,0.1) 60%, transparent 100%) !important;
      }

      .jvs-interstitial__text { font-size: clamp(1.8rem, 8vw, 2.8rem) !important; }
    }
  </style>
</head>
<body>

<div id="world"></div>

<!-- Interstitial text overlays — appear during connectors -->
<div class="jvs-interstitial" id="inter1">
  <div class="jvs-interstitial__text">
    <span class="jvs-small">Now let me show you</span>
    What I <span class="jvs-accent">build</span> with.
  </div>
</div>
<div class="jvs-interstitial" id="inter2">
  <div class="jvs-interstitial__text">
    <span class="jvs-small">Where it all happens</span>
    <span class="jvs-accent">Google</span> scale.
  </div>
</div>
<div class="jvs-interstitial" id="inter3">
  <div class="jvs-interstitial__text">
    <span class="jvs-small">Interested?</span>
    Let's <span class="jvs-accent">connect</span>.
  </div>
</div>

<script src="assets/scrub-engine.js"></script>
<script>
  window.scrollTo(0, 0);

  mountScrollWorld(document.getElementById('world'), {
    brand:      { name: 'JVS', href: '#top' },
    diveScroll: 2.4,
    connScroll: 2.8,
    hint:       'scroll to explore',
    nav:        true,
    atmosphere: true,

    sections: [
      {
        id:      'hero',
        label:   'Home',
        still:   'assets/stills/scene1.png',
        clip:    'assets/vid/dive1-enc.mp4',
        clipMobile: 'assets/vid/dive1-m.mp4',
        accent:  '#1A73E8',
        scroll:  4.4,
        linger:  0.7,
        eyebrow: 'WHO AM I',
        title:   'JVS.',
        body:    'Jainam Vipulkumar Shastri. Data Analyst. Google Vendor. I order machines where demand hits and kill blockers before they become outages.',
        tags:    ['Data Analyst', 'Google Vendor', 'Data Centers']
      },
      {
        id:      'skills',
        label:   'Skills',
        still:   'assets/stills/scene2.png',
        clip:    'assets/vid/dive2-enc.mp4',
        clipMobile: 'assets/vid/dive2-m.mp4',
        accent:  '#FBBC04',
        scroll:  2.0,
        linger:  0.45,
        eyebrow: 'WHAT I USE',
        title:   'The Stack.',
        body:    'SQL → BigQuery → Python → Pandas → Looker → Dashboards → Decisions. End to end.',
        tags:    ['SQL', 'BigQuery', 'Python', 'Pandas', 'Looker', 'Data Studio', 'Sheets']
      },
      {
        id:      'projects',
        label:   'Projects',
        still:   'assets/stills/scene3.png',
        clip:    'assets/vid/dive3-enc.mp4',
        clipMobile: 'assets/vid/dive3-m.mp4',
        accent:  '#1A73E8',
        scroll:  2.2,
        linger:  0.5,
        eyebrow: 'WHAT I DO',
        title:   'Google Data Centers.',
        body:    'Machine procurement at scale. Demand forecasting. Blocker mitigation. Zero downtime.',
        tags:    ['Procurement', 'Supply Chain', 'Forecasting', 'Ops Analytics']
      },
      {
        id:      'contact',
        label:   'Contact',
        still:   'assets/stills/scene4.png',
        clip:    'assets/vid/dive4-enc.mp4',
        clipMobile: 'assets/vid/dive4-m.mp4',
        accent:  '#FBBC04',
        scroll:  2.0,
        linger:  0.45,
        eyebrow: "WHAT'S NEXT",
        title:   "Let's Talk.",
        body:    'Open for opportunities. Full-time. Remote-friendly.',
        tags:    ['Available', 'Full-time', 'Remote-friendly'],
        cta: {
          primary:   { label: 'GitHub', href: 'https://github.com/JainamShastri24' },
          secondary: { label: 'LinkedIn', href: 'https://linkedin.com/in/jainam-shastri' }
        }
      }
    ],

    connectors:       ['assets/vid/conn1-enc.mp4', 'assets/vid/conn2-enc.mp4', 'assets/vid/conn3-enc.mp4'],
    connectorsMobile: ['assets/vid/conn1-m.mp4',   'assets/vid/conn2-m.mp4',   'assets/vid/conn3-m.mp4']
  });

  // ── Post-mount: editorial typography (mixed word sizes) ──
  (function editorialTitles() {
    var copies = document.querySelectorAll('.sw-copy');
    if (copies.length < 4) return;

    // Section 1: "JVS." → JVS massive
    copies[0].querySelector('.sw-copy__title').innerHTML =
      '<span style="font-size:1.6em;letter-spacing:-0.05em">JVS</span><span style="color:#1A73E8">.</span>';

    // Section 2: "The" small, "Stack." big
    copies[1].querySelector('.sw-copy__title').innerHTML =
      '<span style="font-size:0.5em;font-weight:400;letter-spacing:0.08em;display:block;color:rgba(255,255,255,0.55)">THE</span>' +
      'Stack<span style="color:#FBBC04">.</span>';

    // Section 3: "Google" medium, "Data Centers." big
    copies[2].querySelector('.sw-copy__title').innerHTML =
      '<span style="font-size:0.55em;font-weight:400;display:block;color:rgba(255,255,255,0.55)">Google</span>' +
      'Data Centers<span style="color:#1A73E8">.</span>';

    // Section 4: "Let's" small, "talk." big
    copies[3].querySelector('.sw-copy__title').innerHTML =
      '<span style="font-size:0.5em;font-weight:400;display:block;color:rgba(255,255,255,0.55)">LET\'S</span>' +
      'Talk<span style="color:#FBBC04">.</span>';
  })();


  // ── Interstitial text during connectors ──
  // The engine creates a track div; we watch scroll to detect connector ranges.
  (function interstitials() {
    var inters = [
      document.getElementById('inter1'),
      document.getElementById('inter2'),
      document.getElementById('inter3')
    ];
    // The engine uses `--sw-progress` or we can compute from scroll.
    // Each section scroll + each conn scroll define the bands.
    // Approximate: show interstitial when between 35%-65% of connector range.

    var diveScroll = 2.4, connScroll = 2.8;
    var sections = [4.4, 2.0, 2.2, 2.0]; // per-section scroll overrides
    var vh;

    function layout() {
      vh = window.innerHeight;
    }
    layout();
    window.addEventListener('resize', layout);

    function update() {
      var scrollY = window.pageYOffset;
      var pos = scrollY / vh;

      // Calculate connector band start positions
      var cursor = 0;
      for (var i = 0; i < 3; i++) {
        cursor += sections[i] || diveScroll; // dive band
        var connStart = cursor;
        var connEnd = cursor + connScroll;
        var mid = (connStart + connEnd) / 2;
        var halfShow = connScroll * 0.3;

        if (pos > mid - halfShow && pos < mid + halfShow) {
          inters[i].classList.add('is-visible');
        } else {
          inters[i].classList.remove('is-visible');
        }
        cursor = connEnd; // after connector
      }

      requestAnimationFrame(update);
    }
    update();
  })();
</script>

</body>
</html>
